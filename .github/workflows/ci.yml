name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Coverage
        id: coverage
        continue-on-error: true
        run: bun run test:coverage

      - name: Build
        run: bun run build

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn

      - name: Summarize coverage
        if: always()
        run: |
          if [ ! -f coverage/lcov.info ]; then
            {
              echo "## Coverage"
              echo ""
              echo "coverage/lcov.info was not generated."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          node <<'NODE'
          const { readFileSync, appendFileSync } = require("node:fs");

          const lcov = readFileSync("coverage/lcov.info", "utf8");
          const totals = {
            branches: { covered: 0, total: 0 },
            functions: { covered: 0, total: 0 },
            lines: { covered: 0, total: 0 },
          };

          for (const line of lcov.split("\n")) {
            if (line.startsWith("BRF:")) totals.branches.total += Number(line.slice(4));
            if (line.startsWith("BRH:")) totals.branches.covered += Number(line.slice(4));
            if (line.startsWith("FNF:")) totals.functions.total += Number(line.slice(4));
            if (line.startsWith("FNH:")) totals.functions.covered += Number(line.slice(4));
            if (line.startsWith("LF:")) totals.lines.total += Number(line.slice(3));
            if (line.startsWith("LH:")) totals.lines.covered += Number(line.slice(3));
          }

          const percent = ({ covered, total }) =>
            total === 0 ? "100.00%" : `${((covered / total) * 100).toFixed(2)}%`;
          const summary = [
            "## Coverage",
            "",
            "| Metric | Covered | Total | Percent |",
            "| --- | ---: | ---: | ---: |",
            `| Lines | ${totals.lines.covered} | ${totals.lines.total} | ${percent(totals.lines)} |`,
            `| Functions | ${totals.functions.covered} | ${totals.functions.total} | ${percent(totals.functions)} |`,
            `| Branches | ${totals.branches.covered} | ${totals.branches.total} | ${percent(totals.branches)} |`,
            "",
          ].join("\n");

          appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          NODE

      - name: Fail coverage gate
        if: always() && steps.coverage.outcome != 'success'
        run: exit 1

  database:
    name: Database
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: supabase/setup-cli@v2
        with:
          version: 2.104.0
          github-token: ${{ github.token }}

      - name: Start database
        run: supabase db start

      - name: Test database
        env:
          PICKFORGE_ALLOW_LOCAL_DB_TESTS: "1"
          SUPABASE_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
        run: bun run test:supabase

      - name: Check database security
        run: supabase db advisors --local --type security --fail-on warn
